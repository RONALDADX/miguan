# 仓位控制配置

position_strategies:
  # 基础策略
  fixed_fractional:
    enabled: true
    risk_per_trade: 0.02  # 每笔交易风险2%
    
  kelly_criterion:
    enabled: false
    win_rate: 0.55
    win_loss_ratio: 2.0
    
  # 动态仓位调整
  volatility_adjusted:
    enabled: true
    base_position: 0.10  # 基础仓位10%
    volatility_multiplier: 0.5
    
  trend_following:
    enabled: true
    trend_period: 20
    position_multiplier: 1.5

position_limits:
  # 总仓位限制
  max_total_position: 1.0   # 100%仓位
  min_total_position: 0.0   # 0%仓位
  
  # 现金保留
  min_cash_reserve: 0.20    # 至少保留20%现金
  
  # 杠杆限制
  max_leverage: 1.0         # 无杠杆
  
  # 调仓频率
  rebalance_interval: "1d"  # 每日调仓
  max_trades_per_day: 10    # 每日最大交易次数

stop_loss:
  # 止损策略
  fixed_stop:
    enabled: true
    stop_loss_pct: 0.08     # 8%止损
    
  trailing_stop:
    enabled: true
    trailing_pct: 0.10      # 10%移动止损
    activation_pct: 0.05    # 上涨5%后激活
    
  atr_stop:
    enabled: false
    atr_multiplier: 2.0
    atr_period: 14

take_profit:
  # 止盈策略
  fixed_take_profit:
    enabled: true
    take_profit_pct: 0.20   # 20%止盈
    
  rsi_take_profit:
    enabled: false
    rsi_threshold: 70
    
  scaling_out:
    enabled: true
    scale_points: [0.10, 0.15, 0.20]  # 分批止盈点
    scale_percentages: [0.3, 0.3, 0.4] # 分批比例

sizing_methods:
  # 仓位大小计算方法
  equal_weight:
    enabled: true
    
  risk_parity:
    enabled: false
    target_volatility: 0.15
    
  markowitz:
    enabled: false
    target_return: 0.10
    
  black_litterman:
    enabled: false
    
portfolio_construction:
  # 组合构建规则
  max_positions: 20          # 最大持仓数量
  min_position_size: 0.01    # 最小仓位1%
  max_position_size: 0.20    # 最大仓位20%
  
  # 再平衡规则
  rebalance_threshold: 0.05  # 偏离5%触发再平衡
  tax_consideration: true    # 考虑税收
  
  # 交易成本
  commission_rate: 0.0003    # 0.03%佣金
  slippage_rate: 0.0005      # 0.05%滑点